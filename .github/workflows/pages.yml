name: Deploy Sphinx documentation to Pages

on:
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Fortran compiler and LAPACK
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran liblapack-dev libblas-dev

      - name: Install documentation dependencies
        run: |
          python -m pip install -r docs/requirements.txt
          # Build the checked-out source (not the PyPI release) so autodoc
          # documents the tagged code and gets a loadable equilifort extension.
          python -m pip install .

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Sphinx
        run: python -m sphinx -b html docs docs/_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "docs/_build/html"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
