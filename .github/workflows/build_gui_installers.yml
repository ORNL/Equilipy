name: Build GUI Installers

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  version-guard:
    name: Tag/version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify pyproject version and release tag agree
        run: |
          set -e
          VERSION=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "pyproject version: $VERSION"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "release tag: $TAG"
            if [ "$TAG" != "v$VERSION" ]; then
              echo "::error::Release tag $TAG does not match pyproject version v$VERSION — refusing to build/publish."
              exit 1
            fi
          fi
  build_gui_installers:
    name: Build GUI installer on ${{ matrix.label }}
    needs: version-guard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Mirrors the 64-bit GUI-supported platforms from build_wheels.yml.
          # The PyPI Linux i686 wheel target is intentionally excluded because
          # PySide6 does not provide Linux i686 GUI wheels.
          - os: ubuntu-latest
            arch: x86_64
            label: linux-x86_64
            msystem: ""
            macos_deployment_target: ""
          - os: ubuntu-24.04-arm
            arch: aarch64
            label: linux-arm64
            msystem: ""
            macos_deployment_target: ""
          - os: windows-latest
            arch: AMD64
            label: windows-amd64
            msystem: MINGW64
            macos_deployment_target: ""
          - os: macos-14
            arch: arm64
            label: macos-14-arm64
            msystem: ""
            macos_deployment_target: "14.0"
          - os: macos-15
            arch: arm64
            label: macos-15-arm64
            msystem: ""
            macos_deployment_target: "15.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # The xcb helper libraries must be present at build time so
          # PyInstaller bundles them; otherwise the frozen GUI aborts on
          # systems without them (Qt: "xcb-cursor0 is needed to load the
          # Qt xcb platform plugin").
          sudo apt-get install -y gfortran gcc g++ liblapack-dev libblas-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-xkb1 libxkbcommon-x11-0 \
            libegl1 libopengl0 xvfb

      - name: Install Fortran compiler (macOS)
        if: runner.os == 'macOS'
        uses: awvwgk/setup-fortran@v1
        with:
          compiler: gcc
          version: "latest"

      - name: Set up MSYS2 for Fortran (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-gcc-fortran
          path-type: inherit

      # Same toolchain setup the wheel build uses (pyproject before-build):
      # install gcc/gfortran/openblas into the runner's preinstalled MSYS2 at
      # C:/msys64, which is where setup.py's default MINGW_PREFIX points.
      - name: Install MinGW gfortran and OpenBLAS into C:/msys64 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          C:/msys64/usr/bin/bash -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-gcc mingw-w64-x86_64-gcc-fortran mingw-w64-x86_64-openblas"
          Add-Content $env:GITHUB_PATH "C:\msys64\mingw64\bin"
          # Python 3.8+ does not search PATH for extension-module DLL
          # dependencies, so place the MinGW runtime DLLs next to the
          # in-tree equilifort extension (mirrors what delvewheel does
          # for the released wheels). PyInstaller then bundles them.
          Copy-Item `
            C:\msys64\mingw64\bin\libopenblas*.dll, `
            C:\msys64\mingw64\bin\libgfortran*.dll, `
            C:\msys64\mingw64\bin\libquadmath*.dll, `
            C:\msys64\mingw64\bin\libgcc_s_seh*.dll, `
            C:\msys64\mingw64\bin\libwinpthread*.dll, `
            C:\msys64\mingw64\bin\libgomp*.dll `
            -Destination equilipy\

      - name: Build and install checked-out Equilipy GUI and PyInstaller
        env:
          CC: gcc
          CXX: g++
          FC: gfortran
          MINGW_PREFIX: C:/msys64/mingw64
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Build from this checkout. The GUI workflow is independent of the
          # wheel workflow and must never race a not-yet-published PyPI file.
          python -m pip install ".[gui]" pyinstaller

      - name: Install DMG build tool (macOS)
        if: runner.os == 'macOS'
        run: python -m pip install dmgbuild

      - name: Build PyInstaller app
        run: >
          python -m equilipy.gui.installation.build_gui_distribution
          --app-only
          --label ${{ matrix.label }}

      - name: Smoke test frozen joblib worker startup (Linux)
        if: runner.os == 'Linux'
        run: pyinstaller-dist/Equilipy --equilipy-smoke-joblib

      - name: Smoke test frozen joblib worker startup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller-dist\Equilipy.exe --equilipy-smoke-joblib

      - name: Smoke test frozen joblib worker startup (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller-dist/Equilipy.app/Contents/MacOS/Equilipy --equilipy-smoke-joblib

      - name: Smoke test frozen parallel calculations (Linux)
        if: runner.os == 'Linux'
        run: pyinstaller-dist/Equilipy --equilipy-smoke-calculation

      - name: Smoke test frozen parallel calculations (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller-dist\Equilipy.exe --equilipy-smoke-calculation

      - name: Smoke test frozen parallel calculations (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller-dist/Equilipy.app/Contents/MacOS/Equilipy --equilipy-smoke-calculation

      - name: Verify bundled X11 libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          for lib in libxcb-cursor libxcb-icccm libxcb-image libxcb-keysyms \
                     libxcb-render-util libxcb-shape libxcb-xkb; do
            grep -a -q "$lib" pyinstaller-dist/Equilipy \
              || { echo "::error::$lib is not bundled in the frozen binary"; exit 1; }
          done

      - name: Smoke test frozen GUI startup (Linux)
        if: runner.os == 'Linux'
        run: |
          # Offscreen pass: startup/shutdown logic without a display.
          pyinstaller-dist/Equilipy --equilipy-smoke-gui
          # Xvfb pass: loads the real xcb platform plugin end to end.
          xvfb-run -a env QT_QPA_PLATFORM=xcb pyinstaller-dist/Equilipy --equilipy-smoke-gui

      - name: Smoke test frozen GUI startup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller-dist\Equilipy.exe --equilipy-smoke-gui

      - name: Smoke test frozen GUI startup (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller-dist/Equilipy.app/Contents/MacOS/Equilipy --equilipy-smoke-gui

      - name: Package GUI bundle (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist-gui
          cp pyinstaller-dist/Equilipy "dist-gui/Equilipy-${{ matrix.label }}"
          chmod +x "dist-gui/Equilipy-${{ matrix.label }}"

      - name: Package GUI installer (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist-gui
          python -m dmgbuild \
            -s equilipy/gui/installation/dmgbuild_settings.py \
            "Equilipy" \
            "dist-gui/Equilipy-${{ matrix.label }}.dmg"

      - name: Package GUI bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-gui
          Copy-Item `
            -Path "pyinstaller-dist/Equilipy.exe" `
            -Destination "dist-gui/Equilipy-${{ matrix.label }}.exe"

      - name: Upload GUI installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: equilipy-gui-${{ matrix.label }}
          path: dist-gui/*

      - name: Upload GUI installer to release
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v3
        with:
          files: dist-gui/*
