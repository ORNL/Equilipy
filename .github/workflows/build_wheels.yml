name: Build Wheels
on:
  push:
    branches:
      - main # Build on pushes to main
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.buildplat[0] }} (${{ matrix.buildplat[1] }})
    runs-on: ${{ matrix.buildplat[0] }}
    strategy:
      fail-fast: false
      matrix:
        buildplat:
          - [ "ubuntu-latest", "x86_64", "", 'FC="gfortran" CC="gcc" CXX="g++"' ]
          - [ "windows-latest", "AMD64", "MINGW64", 'FC="gfortran" CC="gcc" CXX="g++"' ]
          - [ "macos-14", "arm64", "", 'MACOSX_DEPLOYMENT_TARGET=14.0 FC="gfortran" CC="gcc" CXX="g++"' ]
          - [ "macos-15", "arm64", "", 'MACOSX_DEPLOYMENT_TARGET=15.0 FC="gfortran" CC="gcc" CXX="g++"' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Fortran compiler (macOS)
        if: runner.os == 'macOS'
        uses: awvwgk/setup-fortran@v1
        with:
          compiler: gcc
          version: 'latest'

      - name: Set up MSYS2 for Fortran (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.buildplat[2] }}
          update: true
          install: mingw-w64-x86_64-gcc-fortran
          path-type: inherit

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS: ${{ matrix.buildplat[1] }}
          CIBW_ENVIRONMENT: ${{ matrix.buildplat[3] }}
        with:
          output-dir: wheelhouse
          config-file: "./pyproject.toml"

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.buildplat[0] }}-${{ matrix.buildplat[1] }}
          path: ./wheelhouse/*.whl

  build_wheels_i686:
    name: Build wheels on ubuntu-latest (i686) - Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["cp310", "cp311", "cp312", "cp313", "cp314"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS: i686
          CIBW_ENVIRONMENT: 'FC="gfortran" CC="gcc" CXX="g++"'
          CIBW_BUILD: ${{ matrix.python }}-*
        with:
          output-dir: wheelhouse
          config-file: "./pyproject.toml"

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-ubuntu-latest-i686-${{ matrix.python }}
          path: ./wheelhouse/*.whl

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: [build_wheels, build_wheels_i686]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./dist
          pattern: cibw-wheels-*
          merge-multiple: true
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TestPYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_wheels_i686]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./dist
          pattern: cibw-wheels-*
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: ./dist/
